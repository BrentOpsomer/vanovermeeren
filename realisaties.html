<!DOCTYPE html>
<html lang="nl" translate="no">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realisaties</title>

    <link rel="stylesheet" href="./css/header.css">
    <link rel="stylesheet" href="./css/footer.css">
    <link rel="stylesheet" href="./css/realisaties.css">

    <script src="./js/include.js" type="module" defer></script>
    <script src="./js/header.js" defer></script>
</head>

<body>
    <header>
        <div id="navigation-placeholder"></div>

        <div class="hero">
            <div class="container">
                <h1 class="titel">REALISATIES</h1>
            </div>
        </div>
    </header>

    <section class="buttonsSection">
        <div class="buttons">
            <button onclick="showCategory('verwarming'); showTitel('verwarmingTitel')">Verwarming</button>
            <button onclick="showCategory('sanitair'); showTitel('sanitairTitel')">Sanitair</button>
            <button onclick="showCategory('ventilatie'); showTitel('ventilatieTitel')">Ventilatie</button>
            <button
                onclick="showCategory('airconditioning'); showTitel('airconditioningTitle')">Airconditioning</button>
        </div>
    </section>

    <main>
        <!-- Verwarming -->
        <section class="gallerySection">
            <h2 class="galleryTitel" id="verwarmingTitel">Verwarming</h2>

            <div class="gallery" id="verwarming">
                <img src="./fotos/verwarming/Warmtepomp/IMG_3347.jpg" alt="Verwarming project 1" data-title="Warmtepomp"
                    onclick="openLightbox(0, 'verwarming')">
                <img src="./fotos/verwarming/Warmtepomp/IMG_8974.jpg" alt="Verwarming project 2" data-title="Warmtepomp"
                    onclick="openLightbox(1, 'verwarming')">
                <img src="./fotos/verwarming/Gas/IMG_0998.jpg" alt="Verwarming project 3" data-title="Gasinstallatie"
                    onclick="openLightbox(2, 'verwarming')">
                <img src="./fotos/verwarming/Gas/IMG_3046.jpg" alt="Verwarming project 4" data-title="Gasinstallatie"
                    onclick="openLightbox(3, 'verwarming')">
                <img src="./fotos/verwarming/Mazout/IMG_1888.jpg" alt="Verwarming project 5" data-title="Mazoutinstallatie"
                    onclick="openLightbox(4, 'verwarming')">
                <img src="./fotos/verwarming/Mazout/IMG_5961.jpg" alt="Verwarming project 6" data-title="Mazoutinstallatie"
                    onclick="openLightbox(5, 'verwarming')">
                <img src="./fotos/verwarming/Vloerverwarming/IMG_0025.jpg" alt="Verwarming project 7" data-title="Vloerverwarming"
                    onclick="openLightbox(6, 'verwarming')">
                <img src="./fotos/verwarming/Vloerverwarming/IMG_7319.jpg" alt="Verwarming project 8" data-title="Vloerverwarming"
                    onclick="openLightbox(7, 'verwarming')">
                <img src="./fotos/verwarming/Gas/IMG_8423.jpg" alt="Verwarming project 9" data-title="Gasinstallatie"
                    onclick="openLightbox(8, 'verwarming')">
            </div>
        </section>

        <!-- Sanitair -->
        <section class="gallerySection">
            <h2 class="galleryTitel hidden" id="sanitairTitel">Sanitair</h2>

            <div class="gallery hidden" id="sanitair">
                <img src="./fotos/sanitair_badkamers/IMG_1912.jpg" alt="Sanitair project 1" data-title="Badkamerrenovatie"
                    onclick="openLightbox(0, 'sanitair')">
                <img src="./fotos/sanitair_badkamers/IMG_5941.jpg" alt="Sanitair project 2" data-title="Badkamerrenovatie"
                    onclick="openLightbox(1, 'sanitair')">
                <img src="./fotos/sanitair_badkamers/IMG_9646.jpg" alt="Sanitair project 3" data-title="Badkamerrenovatie"
                    onclick="openLightbox(2, 'sanitair')">
                <img src="./fotos/sanitaireVoorzieningen/IMG_2663.jpg" alt="Sanitair project 4" data-title="Sanitaire voorzieningen"
                    onclick="openLightbox(3, 'sanitair')">
                <img src="./fotos/sanitaireVoorzieningen/IMG_8864.jpg" alt="Sanitair project 5" data-title="Sanitaire voorzieningen"
                    onclick="openLightbox(4, 'sanitair')">
                <img src="./fotos/waterbehandeling/IMG_7563.jpg" alt="Sanitair project 6" data-title="Waterbehandeling"
                    onclick="openLightbox(5, 'sanitair')">
                <img src="./fotos/waterbehandeling/IMG_7564.jpg" alt="Sanitair project 7" data-title="Waterbehandeling"
                    onclick="openLightbox(6, 'sanitair')">
            </div>
        </section>

        <!-- Ventilatie -->
        <section class="gallerySection">
            <h2 class="galleryTitel hidden" id="ventilatieTitel">Ventilatie</h2>

            <div class="gallery hidden" id="ventilatie">
                <img src="./fotos/ventilatie/IMG_1622.jpg" alt="Ventilatie project 1" data-title="Ventilatie"
                    onclick="openLightbox(0, 'ventilatie')">
                <img src="./fotos/ventilatie/IMG_6552.jpg" alt="Ventilatie project 2" data-title="Ventilatie"
                    onclick="openLightbox(1, 'ventilatie')">
                <img src="./fotos/ventilatie/IMG_6557.jpg" alt="Ventilatie project 3" data-title="Ventilatie"
                    onclick="openLightbox(2, 'ventilatie')">
                <img src="./fotos/ventilatie/IMG_6918.jpg" alt="Ventilatie project 4" data-title="Ventilatie"
                    onclick="openLightbox(3, 'ventilatie')">
                <img src="./fotos/ventilatie/IMG_8424.jpg" alt="Ventilatie project 5" data-title="Ventilatie"
                    onclick="openLightbox(4, 'ventilatie')">
                <img src="./fotos/ventilatie/IMG_8457.jpg" alt="Ventilatie project 6" data-title="Ventilatie"
                    onclick="openLightbox(5, 'ventilatie')">
            </div>
        </section>

        <!-- Airconditioning -->
        <section class="gallerySection">
            <h2 class="galleryTitel hidden" id="airconditioningTitle">Airconditioning</h2>

            <div class="gallery hidden" id="airconditioning">
                <img src="./fotos/airconditioning/IMG_7112.jpg" alt="Airconditioning project 1" data-title="Airconditioning"
                    onclick="openLightbox(0, 'airconditioning')">
                <img src="./fotos/airconditioning/IMG_7122.jpg" alt="Airconditioning project 2" data-title="Airconditioning"
                    onclick="openLightbox(1, 'airconditioning')">
                <img src="./fotos/airconditioning/IMG_7130.jpg" alt="Airconditioning project 3" data-title="Airconditioning"
                    onclick="openLightbox(2, 'airconditioning')">
                <img src="./fotos/airconditioning/IMG_8933.jpg" alt="Airconditioning project 4" data-title="Airconditioning"
                    onclick="openLightbox(3, 'airconditioning')">
                <img src="./fotos/airconditioning/IMG_8934.jpg" alt="Airconditioning project 5" data-title="Airconditioning"
                    onclick="openLightbox(4, 'airconditioning')">
            </div>
        </section>
    </main>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox hidden">
        <span class="close" onclick="closeLightbox()">&times;</span>

        <div class="lightbox-wrapper">
            <p id="lightbox-caption" class="lightbox-caption"></p>
            <img id="lightbox-img" src="" alt="Foto">
        </div>

        <button class="prev" onclick="prevImage()">&#10094;</button>
        <button class="next" onclick="nextImage()">&#10095;</button>
    </div>

    <footer id="footer-placeholder"></footer>

    <script src="https://kit.fontawesome.com/d67b9bf45c.js" crossorigin="anonymous"></script>
    <script src="./js/realisaties.js"></script>
</body>

</html>
